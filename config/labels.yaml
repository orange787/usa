# GitHub Labels Configuration

labels:
  # Type labels
  - name: "type/feature"
    description: "功能需求"
    color: "1d76db"
  - name: "type/bug"
    description: "Bug修复"
    color: "d73a4a"
  - name: "type/data"
    description: "数据需求"
    color: "5319e7"
  - name: "type/event"
    description: "活动需求"
    color: "f9d0c4"
  - name: "type/optimization"
    description: "优化建议"
    color: "bfdadc"

  # Priority labels
  - name: "priority/P0"
    description: "紧急 - 需立即处理"
    color: "d73a4a"
  - name: "priority/P1"
    description: "高 - 本迭代必须完成"
    color: "e99695"
  - name: "priority/P2"
    description: "中 - 计划中"
    color: "fbca04"
  - name: "priority/P3"
    description: "低 - 有空再做"
    color: "0e8a16"

  # Status labels
  - name: "status/todo"
    description: "待处理"
    color: "ededed"
  - name: "status/in-progress"
    description: "开发中"
    color: "0075ca"
  - name: "status/review"
    description: "验收中"
    color: "e4e669"
  - name: "status/done"
    description: "已完成"
    color: "0e8a16"
  - name: "status/blocked"
    description: "被阻塞"
    color: "d93f0b"

  # Source labels
  - name: "source/ops"
    description: "来自运营团队"
    color: "c5def5"
  - name: "source/dev"
    description: "来自开发团队"
    color: "bfd4f2"

  # Approval labels
  - name: "approval/pending"
    description: "等待审批"
    color: "fbca04"
  - name: "approval/approved"
    description: "已审批通过"
    color: "0e8a16"
  - name: "approval/rejected"
    description: "已驳回"
    color: "d73a4a"
